// Détection tap court vs long press sur la sphère
var _sphTimer = null, _sphFired = false;

function _sphStart(e) {
  if (e.type === 'touchstart') { try { e.preventDefault(); } catch(x) {} }
  _sphFired = false;
  clearTimeout(_sphTimer);
  _sphTimer = setTimeout(() => {
    _sphFired = true; _sphTimer = null;
    trigger0mcha396(); // long press = re-random
  }, 500);
}
function _sphEnd() {
  if (_sphTimer) {
    clearTimeout(_sphTimer); _sphTimer = null;
    if (!_sphFired) fbfSpherePress(); // tap court
  }
}
function _sphCancel() { clearTimeout(_sphTimer); _sphTimer = null; }

// Calcule le style inline de la bulle selon la couleur active
function _sphereStyle(color) {
  return {
    borderColor: color + 'BB',
    background: `radial-gradient(circle at 35% 28%,
      rgba(255,255,255,.88) 0%,
      rgba(255,255,255,.45) 5%,
      ${color}AA 18%,
      ${color}77 44%,
      ${color}33 68%,
      rgba(8,2,24,.55) 88%)`,
    boxShadow: `0 0 90px ${color}55,0 0 44px ${color}33,
      inset 0 0 65px ${color}18,
      inset 28px 28px 52px rgba(255,255,255,.13)`
  };
}

function _applyStyle(el, color) {
  const s = _sphereStyle(color);
  el.style.borderColor = s.borderColor;
  el.style.background  = s.background;
  el.style.boxShadow   = s.boxShadow;
}

// Construit la sphère unique centrée
function buildVesicaPairs() {
  const layer = document.getElementById('sphere-layer');
  if (!layer) return;
  layer.innerHTML = '';

  const color = SPHERE_COLORS_12[_sphereColorIdx];

  const wrap = document.createElement('div');
  wrap.id = 'fbf-sphere-wrap';

  const sphere = document.createElement('div');
  sphere.id = 'fbf-sphere';
  sphere.className = 'fbf-bubble' + (flowing ? ' sph-flowing' : '');
  _applyStyle(sphere, color);

  sphere.innerHTML = `
    <div class="sph-shine"></div>
    <div class="sph-content">
      <div class="sph-label">0mcha396</div>
      <div class="sph-freq" id="sphere-freq">${masterFreq}</div>
      <div class="sph-sub" id="sphere-sub">Press &amp; Destress</div>
    </div>`;

  sphere.addEventListener('mousedown',  _sphStart);
  sphere.addEventListener('mouseup',    _sphEnd);
  sphere.addEventListener('mouseleave', _sphCancel);
  sphere.addEventListener('touchstart', _sphStart, {passive:false});
  sphere.addEventListener('touchend',   _sphEnd);

  const btnPlus = document.createElement('button');
  btnPlus.className = 'sph-btn sph-plus';
  btnPlus.textContent = '+';
  btnPlus.addEventListener('click', e => { e.stopPropagation(); fbfStep(36); });

  const btnMinus = document.createElement('button');
  btnMinus.className = 'sph-btn sph-minus';
  btnMinus.textContent = '−';
  btnMinus.addEventListener('click', e => { e.stopPropagation(); fbfStep(-36); });

  wrap.appendChild(sphere);
  wrap.appendChild(btnPlus);
  wrap.appendChild(btnMinus);
  layer.appendChild(wrap);
}

// ── Trigger 0mcha396 — mode full aléatoire binaural ─────────────────
// Band A (36–108) : oscs 0,1
// Band B (108–256): oscs 2,3
// Band C (256–432): oscs 4,5
// Maître : aléatoire 36–432
function trigger0mcha396() {
  masterFreq = 36 + Math.floor(Math.random() * 397);

  PAIRS[0].pingala.baseFreq = 36  + Math.floor(Math.random() * 72);
  PAIRS[1].pingala.baseFreq = 36  + Math.floor(Math.random() * 72);
  PAIRS[2].pingala.baseFreq = 108 + Math.floor(Math.random() * 148);
  PAIRS[3].pingala.baseFreq = 108 + Math.floor(Math.random() * 148);
  PAIRS[4].pingala.baseFreq = 256 + Math.floor(Math.random() * 176);
  PAIRS[5].pingala.baseFreq = 256 + Math.floor(Math.random() * 176);

  // Reset volumes
  PAIRS.forEach(p => { p.pingala.vol = .12; p.ida.vol = .12; });
  PAIRS[MASTER_IDX].pingala.vol = .14; PAIRS[MASTER_IDX].ida.vol = .14;

  if (typeof flowing !== 'undefined' && flowing) {
    PAIRS.forEach((_, i) => {
      tuneOsc(PAIRS[i].pingala.id, calcPFreq(i));
      tuneOsc(PAIRS[i].ida.id,     calcIFreq(i));
    });
  } else {
    startFlow();
  }

  // FX aléatoire
  randomizeFX();

  // Cycle couleur de la sphère
  _sphereColorIdx = (_sphereColorIdx + 1) % SPHERE_COLORS_12.length;

  updateDisplay();
  saveState();
}

// ── Bouton +/− sur la sphère : ±36 Hz maître + ratio aléatoire pour chaque osc ──
function fbfStep(delta) {
  masterFreq = Math.max(36, Math.min(432, masterFreq + delta));

  for (let i = 0; i < MASTER_IDX; i++) {
    const ratio = RATIO_OPTS[Math.floor(Math.random() * RATIO_OPTS.length)].r;
    PAIRS[i].pingala.baseFreq = Math.max(36, Math.min(432,
      PAIRS[i].pingala.baseFreq + delta * ratio));
    if (typeof flowing !== 'undefined' && flowing) {
      tuneOsc(PAIRS[i].pingala.id, calcPFreq(i));
      tuneOsc(PAIRS[i].ida.id,     calcIFreq(i));
    }
  }
  if (typeof flowing !== 'undefined' && flowing) {
    tuneOsc(PAIRS[MASTER_IDX].pingala.id, masterFreq);
    tuneOsc(PAIRS[MASTER_IDX].ida.id,     calcIFreq(MASTER_IDX));
  }

  updateDisplay();
  saveState();
}

// ── FX aléatoire (mobile-safe) ──────────────────────────────────────
function randomizeFX() {
  // Tout sur mobile (APK) : pas de reverb, delay léger, EQ doux, chorus off
  const delT  = +(0.15 + Math.random() * .5).toFixed(2);
  const delFB = +(Math.random() * .3).toFixed(2);
  const delW  = +(Math.random() * .12).toFixed(2);  // max 12% — évite les saturations
  const revW  = 0;                                   // reverb toujours off (coût CPU)
  const eqLF  = Math.round(80  + Math.random() * 200);
  const eqLG  = Math.round((Math.random() * 6 - 3) * 10) / 10;   // ±3 dB max
  const eqMF  = Math.round(400 + Math.random() * 2000);
  const eqMG  = Math.round((Math.random() * 6 - 3) * 10) / 10;
  const eqHF  = Math.round(4000 + Math.random() * 6000);
  const eqHG  = Math.round((Math.random() * 6 - 3) * 10) / 10;
  const ppT   = +(0.1 + Math.random() * .4).toFixed(2);           // ping pong 0.1–0.5s
  const ppFB  = +(Math.random() * .4).toFixed(2);
  const ppW   = +(Math.random() * .2).toFixed(2);                 // max 20% mix
  [['eqLowFreq',eqLF],['eqLowGain',eqLG],['eqMidFreq',eqMF],['eqMidGain',eqMG],
   ['eqHighFreq',eqHF],['eqHighGain',eqHG],['delayTime',delT],['delayFeedback',delFB],
   ['delayWet',delW],['reverbWet',revW],['ppTime',ppT],['ppFeedback',ppFB],['ppWet',ppW]
  ].forEach(([id,val]) => {
    const sl = document.getElementById(id); if (sl) sl.value = val;
    if (typeof updateFX === 'function') updateFX(id, val);
  });
  // Chorus désactivé sur mobile (source principale de craquement)
  if (typeof chorus !== 'undefined' && chorus) {
    try { chorus.depth = 0; chorus.wet.value = 0; } catch(e) {}
  }
  // Respiration : activée aléatoirement (40% chance), rythme méditation 4.8–15 /min
  const breathOn    = Math.random() < 0.4;
  const breathRate  = +(0.08 + Math.random() * 0.17).toFixed(3);
  const breathDepth = +(0.1  + Math.random() * 0.40).toFixed(2);
  const brEl = document.getElementById('breath-rate');
  const bdEl = document.getElementById('breath-depth');
  const boEl = document.getElementById('breath-on');
  if (brEl) { brEl.value = breathRate;  if (typeof breathSet==='function') breathSet('rate', breathRate); }
  if (bdEl) { bdEl.value = breathDepth; if (typeof breathSet==='function') breathSet('depth', breathDepth); }
  if (boEl) { boEl.checked = breathOn;  if (typeof breathToggle==='function') breathToggle(breathOn); }
}

// ── EQ 2D Parametric Canvas ───────────────────────────────────────
const EQ_BANDS=[
  {id:'low', freq:200, gain:0,color:'#60D8FF',type:'lowshelf', fMin:20,  fMax:600,  label:'BAS'},
  {id:'mid', freq:1000,gain:0,color:'#FFD060',type:'peak',     fMin:200, fMax:6000, label:'MID'},
  {id:'high',freq:5000,gain:0,color:'#FF8EFF',type:'highshelf',fMin:2000,fMax:20000,label:'HAUT'},
];
var _eqDrag=null;
function _f2x(f,w){return w*Math.log(f/20)/Math.log(1000);}
function _x2f(x,w){return 20*Math.pow(1000,x/w);}
function _g2y(g,h){return h*(1-(g+18)/36);}
function _y2g(y,h){return(1-y/h)*36-18;}
function _eqCurveY(f){
  let s=0;
  EQ_BANDS.forEach(b=>{
    if(b.type==='lowshelf')s+=b.gain*(1-Math.min(1,Math.max(0,Math.log(f/b.freq)/Math.log(4))));
    else if(b.type==='highshelf')s+=b.gain*Math.min(1,Math.max(0,Math.log(f/b.freq)/Math.log(4)));
    else s+=b.gain*Math.exp(-0.5*Math.pow(Math.log(f/b.freq)/1.5,2));
  });
  return Math.max(-18,Math.min(18,s));
}
function drawEQ2D(cv){
  if(!cv)return;
  const W=cv.offsetWidth||240,H=cv.offsetHeight||110;
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(4,2,16,.9)';ctx.fillRect(0,0,W,H);
  // Grid
  [50,100,200,500,1000,2000,5000,10000].forEach(f=>{
    if(f>20000)return;
    const x=_f2x(f,W);
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    if(f>=100){ctx.fillStyle='rgba(255,255,255,.2)';ctx.font=`${Math.max(7,W*.028)}px monospace`;
      ctx.fillText(f>=1000?(f/1000)+'k':f,x+2,H-3);}
  });
  // 0 dB line
  const y0=_g2y(0,H);
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(0,y0);ctx.lineTo(W,y0);ctx.stroke();ctx.setLineDash([]);
  // EQ curve
  const N=100;
  ctx.beginPath();
  for(let i=0;i<=N;i++){const f=20*Math.pow(1000,i/N);const x=_f2x(f,W);const y=_g2y(_eqCurveY(f),H);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.strokeStyle='rgba(160,210,255,.6)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.lineTo(W,y0);ctx.lineTo(0,y0);ctx.closePath();
  ctx.fillStyle='rgba(80,150,255,.06)';ctx.fill();
  // Band nodes
  EQ_BANDS.forEach(b=>{
    const x=_f2x(b.freq,W),y=_g2y(b.gain,H);
    ctx.shadowColor=b.color;ctx.shadowBlur=10;
    ctx.fillStyle=b.color+'99';ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=b.color;ctx.font=`bold ${Math.max(7,W*.03)}px monospace`;ctx.fillText(b.label,x+8,y-5);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font=`${Math.max(6,W*.026)}px monospace`;
    ctx.fillText(b.freq>=1000?(b.freq/1000).toFixed(1)+'k':Math.round(b.freq),x+8,y+7);
    ctx.fillText((b.gain>=0?'+':'')+b.gain.toFixed(1)+'dB',x+8,y+16);
  });
}
function _eqApply(bi){
  const b=EQ_BANDS[bi];
  if(bi===0&&typeof eqLow!=='undefined'&&eqLow){eqLow.frequency.value=b.freq;eqLow.gain.value=b.gain;}
  if(bi===1&&typeof eqMid!=='undefined'&&eqMid){eqMid.frequency.value=b.freq;eqMid.gain.value=b.gain;}
  if(bi===2&&typeof eqHigh!=='undefined'&&eqHigh){eqHigh.frequency.value=b.freq;eqHigh.gain.value=b.gain;}
}
function initEQ2D(cv){
  if(!cv)return;
  if(cv.offsetWidth<10){requestAnimationFrame(()=>initEQ2D(cv));return;}
  if(cv._eq2d)return;cv._eq2d=true;
  const getXY=(e)=>{const r=cv.getBoundingClientRect();const s=e.touches?e.touches[0]:e;return{x:s.clientX-r.left,y:s.clientY-r.top};};
  const findBand=(x,y)=>EQ_BANDS.findIndex(b=>{const W=cv.offsetWidth,H=cv.offsetHeight;return Math.hypot(x-_f2x(b.freq,W),y-_g2y(b.gain,H))<18;});
  const drag=(x,y)=>{
    if(_eqDrag===null||_eqDrag<0)return;
    const b=EQ_BANDS[_eqDrag],W=cv.offsetWidth,H=cv.offsetHeight;
    b.freq=Math.max(b.fMin,Math.min(b.fMax,_x2f(x,W)));
    b.gain=Math.max(-18,Math.min(18,_y2g(y,H)));
    _eqApply(_eqDrag);drawEQ2D(cv);
  };
  cv.addEventListener('mousedown',e=>{const{x,y}=getXY(e);_eqDrag=findBand(x,y);if(_eqDrag>=0)e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(_eqDrag===null||_eqDrag<0)return;const r=cv.getBoundingClientRect();drag(e.clientX-r.left,e.clientY-r.top);});
  window.addEventListener('mouseup',()=>{_eqDrag=null;});
  cv.addEventListener('touchstart',e=>{const{x,y}=getXY(e);_eqDrag=findBand(x,y);if(_eqDrag>=0)e.preventDefault();},{passive:false});
  cv.addEventListener('touchmove',e=>{if(_eqDrag===null||_eqDrag<0)return;e.preventDefault();const r=cv.getBoundingClientRect();drag(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
  cv.addEventListener('touchend',()=>{_eqDrag=null;});
  (function loop(){drawEQ2D(cv);requestAnimationFrame(loop);})();
}

// ── Spectroid bar ─────────────────────────────────────────────────
function _drawSpectroidOnCanvas(canvas) {
  if (!canvas) return;
  const parent = canvas.parentElement; if (!parent) return;
  const pw = parent.clientWidth, ph = parent.clientHeight;
  if (pw > 0 && (canvas.width !== pw || canvas.height !== ph)) { canvas.width = pw; canvas.height = ph; }
  const ctx = canvas.getContext('2d');
  if (!flowing || !analyser) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(180,190,220,.18)'; ctx.font = 'italic 11px IM Fell English';
    ctx.textAlign = 'center';
    ctx.fillText('· en attente de rayonnement ·', canvas.width/2, canvas.height/2+4);
    return;
  }
  const values = analyser.getValue();
  ctx.fillStyle = 'rgba(5,3,18,.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath(); ctx.lineWidth = 2;
  const grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
  grad.addColorStop(0,'rgba(180,190,220,.6)'); grad.addColorStop(.25,'rgba(220,200,255,.9)');
  grad.addColorStop(.5,'rgba(255,255,255,.95)'); grad.addColorStop(.75,'rgba(200,220,255,.9)');
  grad.addColorStop(1,'rgba(160,180,220,.6)');
  ctx.strokeStyle = grad;
  const sliceW = canvas.width / values.length; let x = 0;
  for (let i = 0; i < values.length; i++) {
    const y = (values[i] * 1.4 + 1) * canvas.height / 2;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x += sliceW;
  }
  ctx.stroke();
  ctx.globalAlpha = 0.28; ctx.beginPath(); x = 0;
  for (let i = 0; i < values.length; i++) {
    const y = canvas.height - (values[i] * 1.4 + 1) * canvas.height / 2;
    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); x += sliceW;
  }
  ctx.stroke(); ctx.globalAlpha = 1;
}
function drawSpectroidBar() {
  _drawSpectroidOnCanvas(document.getElementById('spectroid-canvas'));
  _drawSpectroidOnCanvas(document.getElementById('fx-spectroid-canvas'));
}

// ── FX helpers ────────────────────────────────────────────────────
function adjustFX(paramId, step) {
  const slider = document.getElementById(paramId); if (!slider) return;
  slider.value = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), parseFloat(slider.value)+step));
  updateFX(paramId, slider.value);
}
function updateFX(paramId, value) {
  const v = parseFloat(value);
  const valDisp = document.getElementById(paramId+'-val');
  if (paramId==='eqLowFreq')  { if(valDisp)valDisp.textContent=Math.round(v)+' Hz'; if(eqLow)eqLow.frequency.value=v; EQ_BANDS[0].freq=v; }
  else if(paramId==='eqLowGain')  { if(valDisp)valDisp.textContent=v.toFixed(1)+' dB'; if(eqLow)eqLow.gain.value=v; EQ_BANDS[0].gain=v; }
  else if(paramId==='eqMidFreq')  { if(valDisp)valDisp.textContent=Math.round(v)+' Hz'; if(eqMid)eqMid.frequency.value=v; EQ_BANDS[1].freq=v; }
  else if(paramId==='eqMidGain')  { if(valDisp)valDisp.textContent=v.toFixed(1)+' dB'; if(eqMid)eqMid.gain.value=v; EQ_BANDS[1].gain=v; }
  else if(paramId==='eqHighFreq') { if(valDisp)valDisp.textContent=Math.round(v)+' Hz'; if(eqHigh)eqHigh.frequency.value=v; EQ_BANDS[2].freq=v; }
  else if(paramId==='eqHighGain') { if(valDisp)valDisp.textContent=v.toFixed(1)+' dB'; if(eqHigh)eqHigh.gain.value=v; EQ_BANDS[2].gain=v; }
  else if(paramId==='delayTime')     { if(valDisp)valDisp.textContent=v.toFixed(2)+'s'; try{if(masterDelay)masterDelay.delayTime.value=v;}catch(e){} }
  else if(paramId==='delayFeedback') { if(valDisp)valDisp.textContent=Math.round(v*100)+'%'; try{if(masterDelay)masterDelay.feedback.value=v;}catch(e){} }
  else if(paramId==='delayWet')  { if(valDisp)valDisp.textContent=Math.round(v*100)+'%'; if(masterDelay)masterDelay.wet.value=v; }
  else if(paramId==='reverbWet')  { if(valDisp)valDisp.textContent=Math.round(v*100)+'%'; if(masterReverb){ _setReverbActive(v>0.001); masterReverb.wet.value=v; } }
  else if(paramId==='ppTime')     { if(valDisp)valDisp.textContent=v.toFixed(2)+'s'; try{if(pingPongDelay)pingPongDelay.delayTime.value=v;}catch(e){} }
  else if(paramId==='ppFeedback') { if(valDisp)valDisp.textContent=Math.round(v*100)+'%'; try{if(pingPongDelay)pingPongDelay.feedback.value=v;}catch(e){} }
  else if(paramId==='ppWet')      { if(valDisp)valDisp.textContent=Math.round(v*100)+'%'; if(pingPongDelay)pingPongDelay.wet.value=v; }
}

function updateMasterState() {
  const active = PAIRS.filter(p => !mutedOscs[p.ida.id]);
  const el    = document.getElementById('ms-state');
  const badge = document.getElementById('wave-badge');
  if (!active.length) {
    if (el)    { el.textContent='Binaural'; el.style.color='rgba(200,140,255,.5)'; }
    if (badge) { badge.textContent=''; badge.className='wave-badge'; }
    return;
  }
  const avg = active.reduce((s,p)=>s+p.ida.delta,0)/active.length;
  const ws  = waveState(avg);
  if (el)    { el.textContent=ws.s; el.style.color=ws.c; }
  if (badge && flowing) {
    badge.textContent=ws.s+' · '+avg.toFixed(2)+' Hz';
    badge.style.color=ws.c;
    badge.className='wave-badge live';
  } else if (badge) { badge.textContent=''; badge.className='wave-badge'; }
}

// ── Progression Harmonique ────────────────────────────────────────
let progRunning = false;
let progTimer   = null;
let progDir     = 1;
let progFreqCur = 252;

function getProgRange() {
  const lo = Math.max(36,   Math.min(864, parseInt(document.getElementById('prog-min')?.value)||36));
  const hi = Math.max(lo+1, Math.min(864, parseInt(document.getElementById('prog-max')?.value)||864));
  return { lo, hi };
}
function progStep() {
  const ri = parseInt(document.getElementById('prog-ratio').value);
  const r  = RATIO_OPTS[ri].r;
  const { lo, hi } = getProgRange();
  let next = Math.round(progFreqCur * (progDir===1 ? r : 1/r) * 100) / 100;
  if (next > hi) next = lo;
  if (next < lo) next = hi;
  progFreqCur = Math.max(lo, Math.min(hi, next));
  masterFreq  = Math.round(progFreqCur);
  updateDisplay();
  if (flowing) PAIRS.forEach((pair,i) => { tuneOsc(pair.pingala.id,calcPFreq(i)); tuneOsc(pair.ida.id,calcIFreq(i)); });
  const disp = document.getElementById('prog-display');
  if (disp) { disp.textContent=masterFreq+' Hz · '+RATIO_OPTS[ri].l; disp.classList.add('active'); }
  saveState();
}
function startProgression() {
  const dur = parseInt(document.getElementById('prog-dur').value)||4000;
  progFreqCur = masterFreq; progRunning = true;
  const on = document.getElementById('btn-prog-on'), off = document.getElementById('btn-prog-off');
  if (on) on.classList.add('running');
  if (off) off.classList.remove('running');
  const disp = document.getElementById('prog-display');
  if (disp) disp.textContent = masterFreq+' Hz — départ';
  progStep();
  progTimer = setInterval(progStep, dur);
}
function stopProgression() {
  progRunning = false;
  clearInterval(progTimer); progTimer = null;
  const on = document.getElementById('btn-prog-on'), off = document.getElementById('btn-prog-off');
  if (on) on.classList.remove('running');
  const disp = document.getElementById('prog-display');
  if (disp) { disp.textContent=masterFreq+' Hz — arrêté'; disp.classList.remove('active'); }
}

// ── Persistance localStorage ──────────────────────────────────────
let _saveTimer = null;
function saveState() { clearTimeout(_saveTimer); _saveTimer = setTimeout(_doSave, 500); }
function _doSave() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      masterFreq, globalDelta, masterVol, activeGeometry, sphereColorIdx: _sphereColorIdx,
      pairs: PAIRS.map(p => ({
        ri:p.pingala.ri, n:p.pingala.n, volP:p.pingala.vol, baseFreq:p.pingala.baseFreq,
        delta:p.ida.delta, polarity:p.ida.polarity, volI:p.ida.vol,
        mutedP:!!mutedOscs[p.pingala.id], mutedI:!!mutedOscs[p.ida.id]
      }))
    }));
  } catch(e) {}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (!s) return;
    if (s.masterFreq>=36&&s.masterFreq<=432) masterFreq = s.masterFreq;
    if (s.globalDelta>0) globalDelta = s.globalDelta;
    if (s.masterVol>=0&&s.masterVol<=1) masterVol = s.masterVol;
    if (typeof s.activeGeometry==='number') activeGeometry = s.activeGeometry;
    if (typeof s.sphereColorIdx==='number') _sphereColorIdx = s.sphereColorIdx % SPHERE_COLORS_12.length;
    (s.pairs||[]).forEach((sp,i) => {
      if (!PAIRS[i]) return;
      if (sp.ri>=0&&sp.ri<RATIO_OPTS.length) PAIRS[i].pingala.ri = sp.ri;
      if (!isNaN(sp.n)&&sp.n>=0) PAIRS[i].pingala.n = sp.n;
      if (sp.volP>=0) PAIRS[i].pingala.vol = sp.volP;
      if (sp.baseFreq>=36&&sp.baseFreq<=432) PAIRS[i].pingala.baseFreq = sp.baseFreq;
      if (sp.delta>0) PAIRS[i].ida.delta = sp.delta;
      if (sp.polarity===1||sp.polarity===-1) PAIRS[i].ida.polarity = sp.polarity;
      if (sp.volI>=0) PAIRS[i].ida.vol = sp.volI;
      mutedOscs[PAIRS[i].pingala.id] = !!sp.mutedP;
      mutedOscs[PAIRS[i].ida.id]     = !!sp.mutedI;
    });
  } catch(e) {}
}

  if (btn) btn.classList.toggle('on', !open);
  if (!open) closePanel();
}
function closeMenu() {
  const m = document.getElementById('drop-menu');
  const b = document.getElementById('menu-backdrop');
  const btn = document.getElementById('bnt-menu');
  if (m) m.classList.remove('open');
  if (b) b.classList.remove('open');
  if (btn) btn.classList.remove('on');
}

// ── Panel navigation (tab-nav centré) ────────────────────────────
let _openPanel = null;
let _openBtnId = null;

function tPanel(panId, btnId) {
  const pan = document.getElementById(panId);
  const btn = document.getElementById(btnId);
  if (!pan) return;

  // Désactiver le bouton principal 0mcha396 quand un panel est ouvert
  const mainBtn = document.getElementById('bnt-main');

  if (_openPanel === panId) {
    pan.classList.remove('open');
    if (btn) btn.classList.remove('on');
    _openPanel = null; _openBtnId = null;
    if (mainBtn) mainBtn.classList.add('active');
    return;
  }

  if (_openPanel) {
    const old = document.getElementById(_openPanel);
    if (old) old.classList.remove('open');
    if (_openBtnId) { const ob = document.getElementById(_openBtnId); if (ob) ob.classList.remove('on'); }
  }

  pan.classList.add('open');
  if (btn) btn.classList.add('on');
  _openPanel = panId; _openBtnId = btnId;
  if (mainBtn) mainBtn.classList.remove('active');
  if (panId === 'panFX') requestAnimationFrame(()=>initEQ2D(document.getElementById('eq2d-canvas')));
}

function openTab(id) { tPanel(id, null); }
function closePanel() {
  if (_openPanel) {
    const old = document.getElementById(_openPanel);
    if (old) old.classList.remove('open');
    if (_openBtnId) { const ob = document.getElementById(_openBtnId); if (ob) ob.classList.remove('on'); }
    _openPanel = null; _openBtnId = null;
  }
  const mainBtn = document.getElementById('bnt-main');
  if (mainBtn) mainBtn.classList.add('active');
}

// ── Minuterie de méditation ───────────────────────────────────────
let _sesTimer = null, _sesDur = 0, _sesElapsed = 0, _sesMins = 20;

function timerPreset(mins) {
  _sesMins = mins;
  document.querySelectorAll('.fx-timer-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === mins);
  });
  _updateTimerDisplay(_sesDur > 0 ? (_sesDur - _sesElapsed) : mins * 60);
}

function timerToggle() {
  if (_sesTimer) { _stopTimer(); return; }
  _sesDur = _sesMins * 60; _sesElapsed = 0;
  _updateTimerDisplay(_sesDur);
  _updateTimerHUD(_sesDur, _sesDur);
  playBell();
  _sesTimer = setInterval(() => {
    _sesElapsed++;
    const rem = _sesDur - _sesElapsed;
    _updateTimerDisplay(rem);
    _updateTimerHUD(rem, _sesDur);
    if (rem <= 0) { _stopTimer(); playBell(); setTimeout(playBell,2500); _doFadeStop(); }
  }, 1000);
  const btn = document.getElementById('btn-timer-start');
  if (btn) { btn.textContent = '■ Arrêter'; btn.style.color = '#FF8E8E'; btn.style.borderColor = '#FF8E8E44'; }
}
function _stopTimer() {
  clearInterval(_sesTimer); _sesTimer = null;
  _updateTimerHUD(0, 0);
  const btn = document.getElementById('btn-timer-start');
  if (btn) { btn.textContent = '▶ Démarrer'; btn.style.color = ''; btn.style.borderColor = ''; }
}

function _updateTimerHUD(remaining, total) {
  const hud = document.getElementById('ses-timer-hud');
  const arc = document.getElementById('timer-arc');
  const pctEl = document.getElementById('timer-hud-pct');
  if (!hud) return;
  if (!total || remaining <= 0) {
    hud.classList.remove('active');
    return;
  }
  hud.classList.add('active');
  const pct = Math.max(0, Math.min(1, remaining / total));
  const circ = 113.1;
  if (arc) arc.setAttribute('stroke-dashoffset', (circ * (1 - pct)).toFixed(1));
  const color = pct > 0.5 ? '#86FFC0' : pct > 0.25 ? '#FFD060' : '#FF8E8E';
  if (arc) arc.setAttribute('stroke', color);
  if (pctEl) { pctEl.textContent = Math.ceil(pct * 100) + '%'; pctEl.style.color = color; }
}
function _updateTimerDisplay(seconds) {
  const el = document.getElementById('timer-display'); if (!el) return;
  if (seconds <= 0) { el.textContent = '— fin —'; return; }
  const m = Math.floor(seconds / 60), s = seconds % 60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function _doFadeStop() {
  if (!flowing) return;
  const orig = masterVol, steps = 40;
  let i = 0;
  const fi = setInterval(() => {
    i++; setMasterVol(orig * (1 - i/steps));
    if (i >= steps) { clearInterval(fi); setTimeout(stopFlow, 200); setTimeout(() => setMasterVol(orig), 800); }
  }, 150);
}

// ── Presets de session ────────────────────────────────────────────
const PS_KEY = 'fbf432-session-presets';
let _sessionPresets = [null, null, null, null, null];

function _loadSessionPresets() {
  try {
    const p = JSON.parse(localStorage.getItem(PS_KEY));
    if (Array.isArray(p)) _sessionPresets = p;
  } catch(e) {}
  _renderPresets();
}

function savePreset(slot) {
  const name = window.prompt('Nom du preset :', _sessionPresets[slot]?.name || 'Preset '+(slot+1));
  if (!name) return;
  _sessionPresets[slot] = {
    name, masterFreq, globalDelta, masterVol,
    geo: activeGeometry,
    pairs: PAIRS.map(p => ({
      ri:p.pingala.ri, n:p.pingala.n, vp:p.pingala.vol,
      dt:p.ida.delta, po:p.ida.polarity, vi:p.ida.vol
    }))
  };
  try { localStorage.setItem(PS_KEY, JSON.stringify(_sessionPresets)); } catch(e) {}
  _renderPresets();
}

function loadPreset(slot) {
  const p = _sessionPresets[slot]; if (!p) return;
  if (p.masterFreq>=36 && p.masterFreq<=864) setMasterFreq(p.masterFreq);
  if (p.globalDelta>0) setGlobalDelta(p.globalDelta);
  if (p.masterVol>=0)  setMasterVol(p.masterVol);
  if (typeof p.geo === 'number') setGeometry(p.geo);
  (p.pairs||[]).forEach((sp,i) => {
    if (!PAIRS[i]) return;
    if (sp.ri>=0 && sp.ri<RATIO_OPTS.length) PAIRS[i].pingala.ri = sp.ri;
    if (!isNaN(sp.n) && sp.n>0) PAIRS[i].pingala.n = sp.n;
    if (sp.vp>=0) PAIRS[i].pingala.vol = sp.vp;
    if (sp.dt>0)  PAIRS[i].ida.delta   = sp.dt;
    if (sp.po===1||sp.po===-1) PAIRS[i].ida.polarity = sp.po;
    if (sp.vi>=0) PAIRS[i].ida.vol = sp.vi;
  });
  updateDisplay();
  if (flowing) PAIRS.forEach((_,i) => { tuneOsc(PAIRS[i].pingala.id,calcPFreq(i)); tuneOsc(PAIRS[i].ida.id,calcIFreq(i)); });
  saveState();
}

function delPreset(slot) {
  _sessionPresets[slot] = null;
  try { localStorage.setItem(PS_KEY, JSON.stringify(_sessionPresets)); } catch(e) {}
  _renderPresets();
}

function _renderPresets() {
  _sessionPresets.forEach((p, s) => {
    const nameEl = document.getElementById('ps-name-'+s);
    if (nameEl) nameEl.textContent = p?.name || '— Vide —';
    const loadEl = document.getElementById('ps-load-'+s);
    if (loadEl) loadEl.disabled = !p;
    const delEl = document.getElementById('ps-del-'+s);
    if (delEl) delEl.disabled = !p;
  });
}

/* ═══════════════════════════════════════════════════════════════
   08-bowl-engine.js — Mode « Bol Tibétain »
   ───────────────────────────────────────────────────────────────
   Moteur de lecture d'échantillons + synthèse placeholder, tournant
   ENTIÈREMENT sur le thread audio (AudioWorklet). Aucune mutation de
   graphe en jeu, aucune pression GC → zéro craquement par conception.

   Structure « next level », prête à recevoir :
     • plusieurs MB de samples .wav 32-bit float / 48 kHz (lazy-load)
     • un jeu aléatoire (note longue / courte / frottée / silence)
     • les FX et visuels 3D existants

   API publique (globale) :
     Bowl.init()            → prépare le worklet (idempotent, async)
     Bowl.start()           → lance le jeu aléatoire
     Bowl.stop()            → arrête (release des voix en cours)
     Bowl.strike(opts)      → déclenche un coup unique (test)
     Bowl.loadSample(id,url)→ charge + décode un .wav (lazy)
     Bowl.setParams(p)      → règle densité / gammes / proba gestes
     Bowl.ready             → bool, worklet prêt

   Tant qu'aucun sample n'est chargé, le moteur SYNTHÉTISE un bol
   (partiels inharmoniques) pour valider l'archi offline immédiatement.
   ═══════════════════════════════════════════════════════════════ */

const Bowl = (() => {
  'use strict';

  // ── Code du processeur AudioWorklet (chargé via Blob → offline/APK OK) ──
  const PROCESSOR_SRC = `
  class BowlProcessor extends AudioWorkletProcessor {
    constructor() {
      super();
      this.voices = [];          // voix actives (polyphonie)
      this.samples = {};         // { id: { chans:[Float32Array], len, sr } }
      this.maxVoices = 24;
      this.port.onmessage = (e) => {
        const m = e.data;
        if (m.type === 'loadSample') {
          this.samples[m.id] = { chans: m.chans, len: m.chans[0].length, sr: m.sr };
        } else if (m.type === 'trigger') {
          this._spawn(m.v);
        } else if (m.type === 'releaseAll') {
          for (const v of this.voices) v.releasing = true;
        }
      };
    }

    _spawn(v) {
      if (this.voices.length >= this.maxVoices) this.voices.shift();
      const SR = sampleRate;
      const voice = {
        kind: v.kind,                       // 'strike' | 'bowed' | 'sample'
        gain: v.gain ?? 0.5,
        pan: v.pan ?? 0,                    // -1..1
        age: 0,
        durSamp: Math.max(1, (v.dur ?? 6) * SR),
        releasing: false,
        relSamp: 0,
        relDur: (v.kind === 'bowed' ? 1.2 : 0.4) * SR,
      };
      if (v.sampleId && this.samples[v.sampleId]) {
        voice.kind = 'sample';
        voice.smp = this.samples[v.sampleId];
        voice.pos = 0;
        voice.rate = v.rate ?? 1;
      } else {
        // Synthèse bol : partiels inharmoniques mesurés sur bols chantants.
        const f0 = v.freq ?? 216;
        const ratios = [1, 2.71, 5.18, 8.51, 12.4];
        const decays = [v.dur ?? 6, (v.dur ?? 6) * 0.55, (v.dur ?? 6) * 0.32,
                        (v.dur ?? 6) * 0.2, (v.dur ?? 6) * 0.12];
        const amps = [1, 0.5, 0.32, 0.18, 0.1];
        voice.partials = ratios.map((r, k) => ({
          ph: 0,
          inc: (2 * Math.PI * f0 * r) / SR,
          amp: amps[k],
          decK: 1 / (decays[k] * SR),       // décroissance exponentielle
        }));
        voice.bowed = v.kind === 'bowed';
        voice.swellPh = 0;
        voice.swellInc = (2 * Math.PI * 0.18) / SR;   // swell lent du frottement
        voice.attack = (v.kind === 'bowed' ? 0.6 : 0.004) * SR;
      }
      this.voices.push(voice);
    }

    process(_inputs, outputs) {
      const out = outputs[0];
      const L = out[0], R = out[1] || out[0];
      const N = L.length;
      for (let i = 0; i < N; i++) { L[i] = 0; if (R !== L) R[i] = 0; }

      for (let vi = this.voices.length - 1; vi >= 0; vi--) {
        const v = this.voices[vi];
        // panoramique puissance constante
        const pa = (v.pan + 1) * 0.25 * Math.PI;     // 0..PI/2
        const gL = Math.cos(pa), gR = Math.sin(pa);

        for (let i = 0; i < N; i++) {
          let s = 0;
          if (v.kind === 'sample') {
            const p = v.pos | 0;
            if (p >= v.smp.len) { v.done = true; break; }
            const c0 = v.smp.chans[0][p];
            s = c0;
            // (stéréo sample : géré plus bas si 2 canaux)
            v.pos += v.rate;
          } else {
            // attaque
            let env = v.age < v.attack ? v.age / v.attack : 1;
            if (v.bowed) {
              // frottement : entretien + léger swell d'amplitude
              env *= 0.75 + 0.25 * Math.sin(v.swellPh);
              v.swellPh += v.swellInc;
            }
            for (let k = 0; k < v.partials.length; k++) {
              const pt = v.partials[k];
              const decay = v.bowed ? 1 : Math.exp(-pt.decK * v.age);
              s += Math.sin(pt.ph) * pt.amp * decay;
              pt.ph += pt.inc;
            }
            s *= env * 0.22;
          }
          // release
          let rg = 1;
          if (v.releasing) { rg = 1 - v.relSamp / v.relDur; if (rg <= 0) { v.done = true; } v.relSamp++; }
          const o = s * v.gain * rg;
          L[i] += o * gL;
          if (R !== L) R[i] += o * gR;
          v.age++;
          if (!v.bowed && v.kind !== 'sample' && v.age > v.durSamp) v.releasing = true;
          if (v.done) break;
        }
        if (v.done) this.voices.splice(vi, 1);
      }
      return true;
    }
  }
  registerProcessor('bowl-processor', BowlProcessor);
  `;

  // ── État module ──────────────────────────────────────────────
  let ctx = null, node = null, outGain = null;
  let ready = false, initing = null;
  let playing = false, schedTimer = null;
  let lastGesture = 'rest';

  // gammes de fondamentales (Hz) — base 432, pentatonique douce
  const SCALES = {
    base432: [108, 144, 162, 192, 216, 288, 324, 432],
  };

  const params = {
    density: 1.0,                 // multiplicateur de fréquence des gestes
    scale: 'base432',
    sampleIds: [],                // si vide → synthèse placeholder
    // proba de transition entre gestes (Markov léger)
    weights: { long: 0.32, short: 0.30, bowed: 0.20, rest: 0.18 },
  };

  function _ctx() {
    // réutilise le contexte Tone.js s'il existe (partage l'horloge audio)
    try { return Tone.context.rawContext; } catch (e) { return (ctx ||= new AudioContext()); }
  }

  async function init() {
    if (ready) return true;
    if (initing) return initing;
    initing = (async () => {
      ctx = _ctx();
      if (ctx.state !== 'running') { try { await ctx.resume(); } catch (e) {} }
      const url = URL.createObjectURL(new Blob([PROCESSOR_SRC], { type: 'application/javascript' }));
      await ctx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);
      node = new AudioWorkletNode(ctx, 'bowl-processor', {
        numberOfInputs: 0, numberOfOutputs: 1, outputChannelCount: [2],
      });
      outGain = ctx.createGain();
      outGain.gain.value = 0.9;
      node.connect(outGain);
      _route();
      ready = true;
      return true;
    })();
    return initing;
  }

  // Branche la sortie bol dans la chaîne FX partagée si dispo, sinon destination.
  function _route() {
    try {
      if (typeof eqLow !== 'undefined' && eqLow) { Tone.connect(outGain, eqLow); return; }
    } catch (e) {}
    outGain.connect(ctx.destination);
  }

  // ── Chargement de samples (lazy, décodé une fois) ────────────
  async function loadSample(id, url) {
    await init();
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    const audio = await ctx.decodeAudioData(buf);
    const chans = [];
    for (let c = 0; c < audio.numberOfChannels; c++) chans.push(audio.getChannelData(c).slice());
    node.port.postMessage({ type: 'loadSample', id, chans, sr: audio.sampleRate },
      chans.map((a) => a.buffer));
    if (!params.sampleIds.includes(id)) params.sampleIds.push(id);
    return true;
  }

  // ── Déclenchement d'une voix ─────────────────────────────────
  function strike(opts = {}) {
    if (!ready) { init().then(() => strike(opts)); return; }
    const scale = SCALES[params.scale] || SCALES.base432;
    const freq = opts.freq ?? scale[(Math.random() * scale.length) | 0] * (opts.octave ?? 1);
    const useSample = params.sampleIds.length && !opts.forceSynth;
    node.port.postMessage({
      type: 'trigger',
      v: {
        kind: opts.kind || 'strike',
        freq,
        dur: opts.dur ?? 6,
        gain: opts.gain ?? 0.5,
        pan: opts.pan ?? (Math.random() * 1.6 - 0.8),
        sampleId: useSample ? params.sampleIds[(Math.random() * params.sampleIds.length) | 0] : null,
        rate: opts.rate ?? 1,
      },
    });
  }

  // ── Jeu aléatoire (scheduler thread principal, jitter inaudible) ──
  function _pickGesture() {
    const w = params.weights;
    // favorise la variété : réduit la proba de répéter le même geste
    const adj = { ...w };
    if (adj[lastGesture] !== undefined) adj[lastGesture] *= 0.4;
    const total = Object.values(adj).reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (const k in adj) { if ((r -= adj[k]) <= 0) return (lastGesture = k); }
    return (lastGesture = 'rest');
  }

  function _next() {
    if (!playing) return;
    const g = _pickGesture();
    let wait;   // ms avant le prochain geste
    switch (g) {
      case 'long':
        strike({ kind: 'strike', dur: 9 + Math.random() * 6, gain: 0.55 });
        wait = (3 + Math.random() * 4) * 1000; break;
      case 'short':
        strike({ kind: 'strike', dur: 1.5 + Math.random() * 1.8, gain: 0.45, octave: Math.random() < 0.4 ? 2 : 1 });
        wait = (0.8 + Math.random() * 1.8) * 1000; break;
      case 'bowed':
        strike({ kind: 'bowed', dur: 4 + Math.random() * 5, gain: 0.4 });
        wait = (4 + Math.random() * 4) * 1000; break;
      default: // rest
        wait = (1.2 + Math.random() * 3) * 1000; break;
    }
    wait /= params.density;
    schedTimer = setTimeout(_next, wait);
  }

  async function start() {
    await init();
    if (playing) return;
    playing = true;
    lastGesture = 'rest';
    _next();
  }

  function stop() {
    playing = false;
    clearTimeout(schedTimer); schedTimer = null;
    if (node) node.port.postMessage({ type: 'releaseAll' });
  }

  function setParams(p = {}) {
    Object.assign(params, p);
    if (p.weights) params.weights = { ...params.weights, ...p.weights };
  }

  return {
    init, start, stop, strike, loadSample, setParams,
    get ready() { return ready; },
    get playing() { return playing; },
    _params: params,
  };
})();

if (typeof window !== 'undefined') window.Bowl = Bowl;
