<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>0mcha396</title>
<script src="js/lib/Tone.js"></script>
<link rel="stylesheet" href="css/00-fonts.css">
<link rel="stylesheet" href="css/01-base.css">
<link rel="stylesheet" href="css/02-vesica.css">
<link rel="stylesheet" href="css/03-controls.css">
<link rel="stylesheet" href="css/04-ui.css">
<link rel="stylesheet" href="css/05-mobile.css">
</head>
<body>

<!-- Couche fond d'écran (18 fonds commutables) -->
<div id="cosmic-bg"></div>

<!-- Sphère OmCv — structure 3D fractale kaléidoscopique -->
<canvas id="omcv-canvas"></canvas>

<!-- Titre discret en haut -->
<div id="app-title">0mcha396</div>

<!-- Couche sphère unique -->
<div id="sphere-layer"></div>

<!-- Panel FX (accessible via onglet bas) -->
<div class="pan-right" id="panFX">
  <div id="panel-fx-body"></div>
</div>

<!-- Panel Fonds d'écran -->
<div class="pan-right" id="panBG">
  <div class="bg-panel">
    <div class="bg-panel-head">✦ Fonds d'écran</div>
    <div class="bg-nav">
      <button onclick="prevBackground()" aria-label="Fond précédent">‹</button>
      <button onclick="nextBackground()" aria-label="Fond suivant">›</button>
    </div>
    <div id="bg-grid" class="bg-grid"></div>
  </div>
</div>

<!-- Navigation bas d'écran — 2 boutons + tiroir -->
<nav id="bottom-nav">
  <button class="bnav active" id="bnt-main" onclick="closePanel();closeMenu()">
    <span class="bnav-icon">◉</span>
    <span class="bnav-lbl">0mcha396</span>
  </button>
  <button class="bnav" id="bnt-menu" onclick="toggleMenu()">
    <span class="bnav-icon">☰</span>
    <span class="bnav-lbl">Menu</span>
  </button>
</nav>

<!-- Tiroir menu déroulant -->
<div id="drop-menu">
  <button class="dmenu-item" onclick="tPanel('panFX',null);closeMenu()">
    <span class="dmenu-ico">✦</span>FX — Effets sonores
  </button>
  <button class="dmenu-item" onclick="tPanel('panBG',null);closeMenu()">
    <span class="dmenu-ico">🖼</span>Fonds d'écran
  </button>
  <button class="dmenu-item" onclick="toggleFullscreen();closeMenu()">
    <span class="dmenu-ico" id="btn-fs">⤢</span>Plein écran
  </button>
</div>
<div id="menu-backdrop" onclick="closeMenu()"></div>

<!-- Modal oscillateur (utilisé par le panel FX et le moteur audio) -->
<div id="osc-modal">
  <div id="osc-modal-inner">
    <div id="osc-modal-head">
      <span id="osc-modal-title">Canal</span>
      <button class="panel-close" onclick="closeOscModal()">✕</button>
    </div>
    <div id="osc-modal-body"></div>
  </div>
</div>
<div id="backdrop" onclick="closeOscModal()"></div>

<!-- Bouton latéral Flux on/Off -->
<button id="flux-toggle-btn" onclick="fbfToggle()" aria-label="Flux on/off">
  <span id="flux-toggle-ico">▶</span>
</button>

<!-- HUD minuterie méditation -->
<svg id="ses-timer-hud" viewBox="0 0 40 40" onclick="timerToggle()">
  <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(200,100,255,.15)" stroke-width="3"/>
  <circle id="timer-arc" cx="20" cy="20" r="18" fill="none" stroke="#86FFC0" stroke-width="3"
    stroke-dasharray="113.1" stroke-dashoffset="0" stroke-linecap="round"
    transform="rotate(-90 20 20)"/>
</svg>

<script src="js/01-config.js"></script>
<script src="js/02-audio.js"></script>
<script src="js/03-backgrounds.js"></script>
<script src="js/04-vesica-ui.js"></script>
<script src="js/05-controls.js"></script>
<script src="js/06-ui-builders.js"></script>
<script src="js/07-app.js"></script>
<script src="js/08-bowl-engine.js"></script>
<script src="js/09-omcv-sphere.js"></script>
</body>
</html>
